<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andy´s-Genussreise</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #222222;
      --muted: #666666;
      --primary: #d35400;
      --primary-dark: #a84300;
      --border: #ddd3c7;
      --green: #2e7d32;
      --yellow: #f9a825;
      --red: #c62828;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed, var(--bg));
      color: var(--text);
    }

    header {
      padding: 28px 20px;
      background: linear-gradient(135deg, #ef6c00, #ff8f00);
      color: white;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0 0 6px 0;
      font-size: clamp(28px, 4vw, 44px);
    }

    header p {
      margin: 0;
      opacity: 0.95;
    }

    main {
      width: min(1200px, calc(100% - 32px));
      margin: 24px auto 60px;
      display: grid;
      gap: 20px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button, .button-link {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover, .button-link:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    button.secondary {
      background: #5f6368;
    }

    button.secondary:hover {
      background: #3c4043;
    }

    button.danger {
      background: var(--red);
    }

    button.danger:hover {
      background: #a01b1b;
    }

    input, textarea, select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
    }

    input:focus, textarea:focus, select:focus {
      outline: 3px solid rgba(211,84,0,0.25);
      border-color: var(--primary);
    }

    input.short {
      width: 110px;
    }

    input.medium {
      width: 180px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .panel h2, .panel h3 {
      margin-top: 0;
    }

    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 72vh;
      overflow: auto;
      padding-right: 4px;
    }

    .recipe-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fffaf4;
      cursor: pointer;
      transition: border 0.15s ease, transform 0.15s ease;
    }

    .recipe-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .recipe-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(211,84,0,0.18);
    }

    .recipe-card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: white;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      vertical-align: top;
    }

    th {
      background: #fff3e0;
      text-align: left;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .ingredient-row td, .step-row td {
      border-top: 1px solid var(--border);
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      white-space: nowrap;
    }

    button.small {
      padding: 7px 11px;
      font-size: 13px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .metric {
      background: #fff7ed;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .metric strong {
      font-size: 24px;
    }

    .traffic {
      display: grid;
      gap: 10px;
    }

    .traffic-row {
      display: grid;
      grid-template-columns: 110px 1fr 90px;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .bar {
      height: 14px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > div {
      height: 100%;
      border-radius: 999px;
    }

    .green { background: var(--green); }
    .yellow { background: var(--yellow); }
    .red { background: var(--red); }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 12px;
      text-align: center;
    }

    .pill.green { background: var(--green); }
    .pill.yellow { background: var(--yellow); color: #111; }
    .pill.red { background: var(--red); }

    .hint {
      background: #eef7ff;
      border: 1px solid #b8dcff;
      border-radius: 14px;
      padding: 12px;
      color: #174a7c;
      margin: 0 0 14px 0;
    }

    .empty {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: #fafafa;
    }

    .hidden {
      display: none !important;
    }

    .print-area {
      display: none;
    }

    @media print {
      header, .toolbar, .panel:first-child, .no-print {
        display: none !important;
      }

      main {
        width: 100%;
        margin: 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        box-shadow: none;
      }

      .print-area {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍳 Mein digitales Kochbuch</h1>
    <p>Rezepte verwalten, Nährwerte automatisch berechnen und als Dashboard nutzen.</p>
  </header>

  <main>
    <section class="toolbar no-print">
      <div class="toolbar-left">
        <button id="newRecipeBtn">➕ Neues Rezept</button>
        <button id="exportBtn" class="secondary">⬇️ Exportieren</button>
        <label class="button-link secondary" for="importFile">⬆️ Importieren<input id="importFile" type="file" accept=".json,application/json" class="hidden" /></label>
        <button id="printBtn" class="secondary">🖨️ Drucken</button>
      </div>
      <div class="toolbar-right">
        <input id="searchInput" type="search" placeholder="Rezept suchen..." class="medium" />
      </div>
    </section>

    <section class="grid">
      <aside class="panel no-print">
        <h2>Rezepte</h2>
        <div id="recipeList" class="recipe-list"></div>
      </aside>

      <section class="panel">
        <div id="editor">
          <div class="empty">
            <h2>Willkommen im Kochbuch</h2>
            <p>Lege ein neues Rezept an oder importiere vorhandene Daten.</p>
            <button id="emptyNewBtn">Rezept anlegen</button>
          </div>
        </div>

        <div class="print-area" id="printArea"></div>
      </section>
    </section>
  </main>

  <script src="naehrwerte.js"></script>
  <script>
    const STORAGE_KEY = "digitales-kochbuch-v1";
    const API_BASE = '';

    const FALLBACK_NUTRIENT_LIBRARY = {
      "Apfel": { kcal: 52, protein: 0.3, carbs: 14, fat: 0.2 },
      "Nudeln gekocht": { kcal: 158, protein: 5.8, carbs: 31, fat: 0.9 },
      "Hähnchenbrust": { kcal: 165, protein: 31, carbs: 0, fat: 3.6 }
    };

    let nutrientLibrary = clone(FALLBACK_NUTRIENT_LIBRARY);
    let nutrientLibraryLoaded = false;

    let state = {
      recipes: [],
      selectedId: null,
      search: ""
    };

    const els = {
      newRecipeBtn: document.getElementById("newRecipeBtn"),
      emptyNewBtn: document.getElementById("emptyNewBtn"),
      exportBtn: document.getElementById("exportBtn"),
      importFile: document.getElementById("importFile"),
      printBtn: document.getElementById("printBtn"),
      searchInput: document.getElementById("searchInput"),
      recipeList: document.getElementById("recipeList"),
      editor: document.getElementById("editor"),
      printArea: document.getElementById("printArea")
    };

    function uid() {
      return "r_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function createRecipe() {
      const recipe = {
        id: uid(),
        name: "Neues Rezept",
        category: "Hauptgericht",
        portions: 4,
        prepTime: "",
        cookingTime: "",
        difficulty: "mittel",
        tags: "",
        ingredients: [
          { name: "", amount: 100, unit: "g", nutrientKey: "", kcal: 0, protein: 0, carbs: 0, fat: 0 }
        ],
        steps: [""]
      };
      state.recipes.unshift(recipe);
      state.selectedId = recipe.id;
      save();
      render();
    }

    async function apiRequest(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || `HTTP ${response.status}`);
      }

      if (response.status === 204) return null;
      return response.json();
    }

    async function loadRecipes() {
      try {
        const recipes = await apiRequest("/api/recipes");
        state.recipes = Array.isArray(recipes) ? recipes : [];
        state.selectedId = state.recipes[0]?.id || null;
      } catch (err) {
        console.warn("API konnte nicht geladen werden, nutze localStorage-Fallback:", err.message);
        loadLocalRecipes();
      }
      render();
    }

    function loadLocalRecipes() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved && Array.isArray(saved.recipes)) {
          state.recipes = saved.recipes;
          state.selectedId = saved.selectedId || state.recipes[0]?.id || null;
        } else {
          state.recipes = [];
          state.selectedId = null;
        }
      } catch {
        state.recipes = [];
        state.selectedId = null;
      }
    }

    async function saveRecipeToDatabase(recipe) {
      if (recipe.id) {
        return apiRequest(`/api/recipes/${recipe.id}`, {
          method: "PUT",
          body: JSON.stringify(recipe)
        });
      }

      return apiRequest("/api/recipes", {
        method: "POST",
        body: JSON.stringify(recipe)
      });
    }

    async function save() {
      try {
        await saveRecipeToDatabase(state.recipes.find(r => r.id === state.selectedId));
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          recipes: state.recipes,
          selectedId: state.selectedId
        }));
      }
    }

    async function createRecipe() {
      const recipe = {
        id: uid(),
        name: "Neues Rezept",
        category: "Hauptgericht",
        portions: 4,
        prepTime: "",
        cookingTime: "",
        difficulty: "mittel",
        tags: "",
        ingredients: [
          { name: "", amount: 100, unit: "g", nutrientKey: "", kcal: 0, protein: 0, carbs: 0, fat: 0 }
        ],
        steps: [""]
      };

      try {
        const savedRecipe = await saveRecipeToDatabase(recipe);
        state.recipes.unshift(savedRecipe || recipe);
      } catch {
        state.recipes.unshift(recipe);
      }

      state.selectedId = recipe.id;
      render();
    }

    async function deleteRecipe(recipe) {
      try {
        await apiRequest(`/api/recipes/${recipe.id}`, {
          method: "DELETE"
        });
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          recipes: state.recipes,
          selectedId: state.selectedId
        }));
      }
    }

    async function duplicateRecipe(recipe) {
      const copy = clone(recipe);
      copy.id = uid();
      copy.name = recipe.name + " Kopie";
      state.recipes.unshift(copy);
      state.selectedId = copy.id;
      await saveRecipeToDatabase(copy);
      render();
    }

    async function importRecipes(recipes) {
      try {
        for (const recipe of recipes) {
          await saveRecipeToDatabase(recipe);
        }
        state.recipes = recipes;
        state.selectedId = state.recipes[0]?.id || null;
        render();
        alert("Kochbuch erfolgreich importiert.");
      } catch (err) {
        alert("Import fehlgeschlagen: " + err.message);
      }
    }

    function selectedRecipe() {
      return state.recipes.find(r => r.id === state.selectedId) || null;
    }

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function buildNutrientLibrary() {
      const library = {};
      const categories = window.NUTRIENT_DATA?.categories || {};

      Object.values(categories).forEach(category => {
        (category.items || []).forEach(item => {
          const values = {
            kcal: Number(item.kcal) || 0,
            protein: Number(item.protein) || 0,
            carbs: Number(item.carbs) || 0,
            fat: Number(item.fat) || 0
          };

          library[item.name] = values;

          (item.aliases || []).forEach(alias => {
            library[alias] = values;
          });
        });
      });

      return library;
    }

    function loadNutrientLibrary() {
      try {
        nutrientLibrary = buildNutrientLibrary();
        nutrientLibraryLoaded = Object.keys(nutrientLibrary).length > 0;
      } catch {
        nutrientLibrary = clone(FALLBACK_NUTRIENT_LIBRARY);
        nutrientLibraryLoaded = false;
      }
    }

    function findNutrientKey(name) {
      const clean = normalizeText(name).toLowerCase();
      if (!clean) return "";
      const direct = Object.keys(nutrientLibrary).find(k => k.toLowerCase() === clean);
      if (direct) return direct;

      const contains = Object.keys(nutrientLibrary)
        .filter(k => clean.includes(k.toLowerCase()) || k.toLowerCase().includes(clean))
        .sort((a, b) => b.length - a.length);

      return contains[0] || "";
    }

    function getNutrientName(key) {
      return key || "";
    }

    function getNutrientUnit() {
      return window.NUTRIENT_DATA?.unit || "pro 100 g/ml";
    }

    function getNutrientNote() {
      return window.NUTRIENT_DATA?.note || "Durchschnittswerte pro 100 g/ml.";
    }

    function createRecipe() {
      const key = ingredient.nutrientKey || findNutrientKey(ingredient.name);
      const base = nutrientLibrary[key] || null;
      const amount = Number(ingredient.amount) || 0;
      const unit = String(ingredient.unit || "g").toLowerCase();

      if (!base) {
        return {
          nutrientKey: key,
          kcal: Number(ingredient.kcal) || 0,
          protein: Number(ingredient.protein) || 0,
          carbs: Number(ingredient.carbs) || 0,
          fat: Number(ingredient.fat) || 0
        };
      }

      let grams = amount;
      if (unit.includes("kg")) grams = amount * 1000;
      if (unit.includes("ml")) grams = amount;
      if (unit.includes("l")) grams = amount * 1000;
      if (unit.includes("tasse")) grams = amount * 240;
      if (unit.includes("el")) grams = amount * 15;
      if (unit.includes("tl")) grams = amount * 5;
      if (unit.includes("stück") || unit === "stk" || unit === "st") grams = amount * 100;

      const factor = grams / 100;

      return {
        nutrientKey: key,
        kcal: base.kcal * factor,
        protein: base.protein * factor,
        carbs: base.carbs * factor,
        fat: base.fat * factor
      };
    }

    function calculateTotals(recipe) {
      return recipe.ingredients.reduce((sum, ingredient) => {
        const nutrients = calculateIngredientNutrients(ingredient);
        sum.kcal += nutrients.kcal;
        sum.protein += nutrients.protein;
        sum.carbs += nutrients.carbs;
        sum.fat += nutrients.fat;
        return sum;
      }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    }

    function perPortion(recipe) {
      const totals = calculateTotals(recipe);
      const portions = Number(recipe.portions) || 1;
      return {
        kcal: totals.kcal / portions,
        protein: totals.protein / portions,
        carbs: totals.carbs / portions,
        fat: totals.fat / portions
      };
    }

    function trafficClass(value, type) {
      const thresholds = {
        kcal: [450, 700],
        protein: [15, 30],
        carbs: [30, 60],
        fat: [10, 20]
      };
      const [green, red] = thresholds[type];
      if (value <= green) return "green";
      if (value <= red) return "yellow";
      return "red";
    }

    function trafficLabel(value, type) {
      const cls = trafficClass(value, type);
      if (cls === "green") return "niedrig";
      if (cls === "yellow") return "mittel";
      return "hoch";
    }

    function renderRecipeList() {
      const search = state.search.toLowerCase();
      const recipes = state.recipes
        .filter(r => !search || r.name.toLowerCase().includes(search) || r.tags.toLowerCase().includes(search) || r.category.toLowerCase().includes(search))
        .sort((a, b) => a.name.localeCompare(b.name, "de"));

      if (recipes.length === 0) {
        els.recipeList.innerHTML = `<div class="empty">Keine Rezepte gefunden.</div>`;
        return;
      }

      els.recipeList.innerHTML = recipes.map(recipe => {
        const p = perPortion(recipe);
        return `
          <div class="recipe-card ${recipe.id === state.selectedId ? "active" : ""}" data-id="${recipe.id}">
            <strong>${escapeHtml(recipe.name || "Unbenannt")}</strong>
            <div class="muted">${escapeHtml(recipe.category || "Kategorie")} · ${Number(recipe.portions) || 1} Portion(en)</div>
            <div class="muted">🔥 ${formatNumber(p.kcal)} kcal pro Portion</div>
          </div>
        `;
      }).join("");

      els.recipeList.querySelectorAll(".recipe-card").forEach(card => {
        card.addEventListener("click", () => {
          state.selectedId = card.dataset.id;
          save();
          render();
        });
      });
    }

    function renderEditor() {
      const recipe = selectedRecipe();

      if (!recipe) {
        els.editor.innerHTML = `
          <div class="empty">
            <h2>Kein Rezept ausgewählt</h2>
            <p>Lege ein neues Rezept an.</p>
            <button id="editorEmptyNewBtn">Rezept anlegen</button>
          </div>
        `;
        document.getElementById("editorEmptyNewBtn").addEventListener("click", createRecipe);
        return;
      }

      const totals = calculateTotals(recipe);
      const portion = perPortion(recipe);
      const ingredientRows = recipe.ingredients.map((ingredient, index) => renderIngredientRow(recipe, ingredient, index)).join("");
      const stepRows = recipe.steps.map((step, index) => renderStepRow(recipe, step, index)).join("");

      els.editor.innerHTML = `
        <div class="form-grid">
          <div class="hint no-print">
            Nährwerte werden automatisch berechnet, sobald ein bekannter Zutatennamen eingegeben wird.
            Du kannst Nährwerte auch manuell pro 100 g ergänzen, wenn eine Zutat fehlt.
          </div>

          <div class="inline-grid">
            <label>
              Rezeptname
              <input data-field="name" value="${escapeAttr(recipe.name)}" placeholder="z. B. Linsen-Bolognese" />
            </label>
            <label>
              Kategorie
              <input data-field="category" value="${escapeAttr(recipe.category)}" placeholder="z. B. Hauptgericht" />
            </label>
            <label>
              Schwierigkeit
              <select data-field="difficulty">
                ${["leicht", "mittel", "schwer"].map(v => `<option value="${v}" ${recipe.difficulty === v ? "selected" : ""}>${v}</option>`).join("")}
              </select>
            </label>
          </div>

          <div class="inline-grid">
            <label>
              Portionen
              <input data-field="portions" type="number" min="1" step="1" value="${Number(recipe.portions) || 1}" class="short" />
            </label>
            <label>
              Zubereitungszeit
              <input data-field="prepTime" value="${escapeAttr(recipe.prepTime)}" placeholder="z. B. 15 Min." />
            </label>
            <label>
              Kochzeit
              <input data-field="cookingTime" value="${escapeAttr(recipe.cookingTime)}" placeholder="z. B. 30 Min." />
            </label>
          </div>

          <label>
            Stichwörter / Tags
            <input data-field="tags" value="${escapeAttr(recipe.tags)}" placeholder="z. B. vegetarisch, schnell, meal prep" />
          </label>

          <div class="summary">
            <div class="metric">
              <span>Kalorien gesamt</span>
              <strong>${formatNumber(totals.kcal)} kcal</strong>
            </div>
            <div class="metric">
              <span>pro Portion</span>
              <strong>${formatNumber(portion.kcal)} kcal</strong>
            </div>
            <div class="metric">
              <span>Eiweiß pro Portion</span>
              <strong>${formatNumber(portion.protein)} g</strong>
            </div>
            <div class="metric">
              <span>Kohlenhydrate pro Portion</span>
              <strong>${formatNumber(portion.carbs)} g</strong>
            </div>
            <div class="metric">
              <span>Fett pro Portion</span>
              <strong>${formatNumber(portion.fat)} g</strong>
            </div>
          </div>

          <h2>Zutaten und Nährwerte</h2>
          <table>
            <thead>
              <tr>
                <th style="width: 24%;">Zutat</th>
                <th style="width: 12%;">Menge</th>
                <th style="width: 12%;">Einheit</th>
                <th style="width: 14%;">Nährwert ${escapeHtml(getNutrientUnit())}</th>
                <th style="width: 10%;">kcal</th>
                <th style="width: 10%;">Eiweiß</th>
                <th style="width: 10%;">Kohlenh.</th>
                <th style="width: 10%;">Fett</th>
                <th class="no-print">Aktion</th>
              </tr>
            </thead>
            <tbody>
              ${ingredientRows}
            </tbody>
          </table>
          <button class="no-print" id="addIngredientBtn">➕ Zutat hinzufügen</button>

          <h2>Zubereitung</h2>
          <table>
            <thead>
              <tr>
                <th style="width: 10%;">Schritt</th>
                <th>Beschreibung</th>
                <th class="no-print">Aktion</th>
              </tr>
            </thead>
            <tbody>
              ${stepRows}
            </tbody>
          </table>
          <button class="no-print" id="addStepBtn">➕ Schritt hinzufügen</button>

          <div class="toolbar no-print">
            <div class="toolbar-left">
              <button id="duplicateBtn" class="secondary">📋 Rezept duplizieren</button>
              <button id="deleteBtn" class="danger">🗑️ Rezept löschen</button>
            </div>
          </div>
        </div>
      `;

      bindEditorEvents(recipe);
      updatePrintArea(recipe);
    }

    function renderIngredientRow(recipe, ingredient, index) {
      const nutrients = calculateIngredientNutrients(ingredient);
      const autoKey = ingredient.nutrientKey || findNutrientKey(ingredient.name);
      const libraryNote = nutrientLibrary[autoKey]
        ? `Automatisch: ${escapeHtml(autoKey)}`
        : (normalizeText(ingredient.name) ? "Manuell pro 100 g/ml" : "Noch keine Zutat");

      return `
        <tr class="ingredient-row">
          <td>
            <input data-ingredient="${index}" data-field="name" value="${escapeAttr(ingredient.name)}" placeholder="z. B. Reis" />
            <div class="muted">${libraryNote}</div>
          </td>
          <td>
            <input data-ingredient="${index}" data-field="amount" type="number" min="0" step="1" value="${escapeAttr(ingredient.amount)}" class="short" />
          </td>
          <td>
            <input data-ingredient="${index}" data-field="unit" value="${escapeAttr(ingredient.unit)}" placeholder="g/ml" />
          </td>
          <td>
            <input data-ingredient="${index}" data-field="nutrientKey" value="${escapeAttr(ingredient.nutrientKey)}" placeholder="automatisch" />
            <div class="muted">kcal / P / K / F pro 100 g/ml</div>
            <div class="inline-grid" style="grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 6px;">
              <input data-ingredient="${index}" data-field="kcal" type="number" min="0" step="1" value="${escapeAttr(ingredient.kcal)}" placeholder="kcal" class="short" />
              <input data-ingredient="${index}" data-field="protein" type="number" min="0" step="0.1" value="${escapeAttr(ingredient.protein)}" placeholder="P" class="short" />
              <input data-ingredient="${index}" data-field="carbs" type="number" min="0" step="0.1" value="${escapeAttr(ingredient.carbs)}" placeholder="K" class="short" />
              <input data-ingredient="${index}" data-field="fat" type="number" min="0" step="0.1" value="${escapeAttr(ingredient.fat)}" placeholder="F" class="short" />
            </div>
          </td>
          <td><strong>${formatNumber(nutrients.kcal)}</strong></td>
          <td>${formatNumber(nutrients.protein)} g</td>
          <td>${formatNumber(nutrients.carbs)} g</td>
          <td>${formatNumber(nutrients.fat)} g</td>
          <td class="no-print">
            <button class="small danger" data-remove-ingredient="${index}">Löschen</button>
          </td>
        </tr>
      `;
    }

    function renderStepRow(recipe, step, index) {
      return `
        <tr class="step-row">
          <td><strong>${index + 1}.</strong></td>
          <td>
            <textarea data-step="${index}" placeholder="Zubereitungsschritt eingeben...">${escapeHtml(step)}</textarea>
          </td>
          <td class="no-print">
            <button class="small danger" data-remove-step="${index}">Löschen</button>
          </td>
        </tr>
      `;
    }

    function bindEditorEvents(recipe) {
      els.editor.querySelectorAll("[data-field]").forEach(input => {
        input.addEventListener("input", () => {
          const field = input.dataset.field;
          recipe[field] = input.type === "number" ? Number(input.value) : input.value;
          if (field === "portions") recipe[field] = Math.max(1, Number(recipe[field]) || 1);
          save();

          if (["name", "category", "tags"].includes(field)) {
            renderRecipeList();
          }

          if (["portions", "difficulty", "prepTime", "cookingTime"].includes(field)) {
            updatePrintArea(recipe);
          }
        });
      });

      els.editor.querySelectorAll("[data-ingredient]").forEach(input => {
        input.addEventListener("input", () => {
          const index = Number(input.dataset.ingredient);
          const field = input.dataset.field;
          const ingredient = recipe.ingredients[index];

          if (["amount", "kcal", "protein", "carbs", "fat"].includes(field)) {
            ingredient[field] = Number(input.value) || 0;
          } else {
            ingredient[field] = input.value;
          }

          if (field === "name" && !ingredient.nutrientKey) {
            ingredient.nutrientKey = findNutrientKey(ingredient.name);
          }

          save();

          if (field === "name") {
            renderRecipeList();
          }

          updateIngredientSummary(recipe, index);
          updatePrintArea(recipe);
        });
      });

      els.editor.querySelectorAll("[data-step]").forEach(textarea => {
        textarea.addEventListener("input", () => {
          recipe.steps[Number(textarea.dataset.step)] = textarea.value;
          save();
          updatePrintArea(recipe);
        });
      });

      els.editor.querySelectorAll("[data-remove-ingredient]").forEach(button => {
        button.addEventListener("click", () => {
          recipe.ingredients.splice(Number(button.dataset.removeIngredient), 1);
          if (recipe.ingredients.length === 0) recipe.ingredients.push(createIngredient());
          save();
          render();
        });
      });

      els.editor.querySelectorAll("[data-remove-step]").forEach(button => {
        button.addEventListener("click", () => {
          recipe.steps.splice(Number(button.dataset.removeStep), 1);
          if (recipe.steps.length === 0) recipe.steps.push("");
          save();
          render();
        });
      });

      document.getElementById("addIngredientBtn").addEventListener("click", () => {
        recipe.ingredients.push(createIngredient());
        save();
        render();
      });

      document.getElementById("addStepBtn").addEventListener("click", () => {
        recipe.steps.push("");
        save();
        render();
      });

      document.getElementById("duplicateBtn").addEventListener("click", () => {
        duplicateRecipe(recipe);
      });

      document.getElementById("deleteBtn").addEventListener("click", () => {
        if (!confirm(`Rezept "${recipe.name}" wirklich löschen?`)) return;
        deleteRecipe(recipe);
        state.recipes = state.recipes.filter(r => r.id !== recipe.id);
        state.selectedId = state.recipes[0]?.id || null;
        render();
      });
    }

    function createIngredient() {
      return { name: "", amount: 100, unit: "g", nutrientKey: "", kcal: 0, protein: 0, carbs: 0, fat: 0 };
    }

    function updateIngredientSummary(recipe, changedIndex) {
      const row = els.editor.querySelector(`[data-ingredient="${changedIndex}"]`);
      if (!row) return;

      const ingredient = recipe.ingredients[changedIndex];
      const nutrients = calculateIngredientNutrients(ingredient);
      const autoKey = ingredient.nutrientKey || findNutrientKey(ingredient.name);
      const libraryNote = nutrientLibrary[autoKey]
        ? `Automatisch: ${escapeHtml(autoKey)}`
        : (normalizeText(ingredient.name) ? "Manuell pro 100 g/ml" : "Noch keine Zutat");

      const note = row.parentElement.querySelector(".muted");
      if (note) note.innerHTML = libraryNote;

      const cells = row.querySelectorAll("td");
      if (cells[4]) cells[4].innerHTML = `<strong>${formatNumber(nutrients.kcal)}</strong>`;
      if (cells[5]) cells[5].textContent = `${formatNumber(nutrients.protein)} g`;
      if (cells[6]) cells[6].textContent = `${formatNumber(nutrients.carbs)} g`;
      if (cells[7]) cells[7].textContent = `${formatNumber(nutrients.fat)} g`;

      updateSummary(recipe);
    }

    function updateSummary(recipe) {
      const totals = calculateTotals(recipe);
      const portion = perPortion(recipe);
      const metrics = els.editor.querySelectorAll(".metric strong");

      if (metrics.length >= 5) {
        metrics[0].textContent = `${formatNumber(totals.kcal)} kcal`;
        metrics[1].textContent = `${formatNumber(portion.kcal)} kcal`;
        metrics[2].textContent = `${formatNumber(portion.protein)} g`;
        metrics[3].textContent = `${formatNumber(portion.carbs)} g`;
        metrics[4].textContent = `${formatNumber(portion.fat)} g`;
      }
    }

    function updatePrintArea(recipe) {
      const totals = calculateTotals(recipe);
      const portion = perPortion(recipe);
      const ingredientsHtml = recipe.ingredients
        .filter(i => normalizeText(i.name))
        .map(i => {
          const n = calculateIngredientNutrients(i);
          return `<li>${escapeHtml(i.amount)} ${escapeHtml(i.unit)} ${escapeHtml(i.name)} (${formatNumber(n.kcal)} kcal)</li>`;
        }).join("");

      const stepsHtml = recipe.steps
        .filter(s => normalizeText(s))
        .map((s, i) => `<li>${escapeHtml(s)}</li>`).join("");

      els.printArea.innerHTML = `
        <article>
          <h1>${escapeHtml(recipe.name)}</h1>
          <p><strong>Kategorie:</strong> ${escapeHtml(recipe.category)} · <strong>Schwierigkeit:</strong> ${escapeHtml(recipe.difficulty)} · <strong>Portionen:</strong> ${Number(recipe.portions) || 1}</p>
          <p><strong>Zeit:</strong> ${escapeHtml(recipe.prepTime)} ${recipe.cookingTime ? " · " + escapeHtml(recipe.cookingTime) : ""}</p>

          <h2>Nährwerte pro Portion</h2>
          ${trafficTable(portion)}

          <h2>Zutaten</h2>
          <ul>${ingredientsHtml || "<li>Keine Zutaten eingetragen.</li>"}</ul>

          <h2>Zubereitung</h2>
          <ol>${stepsHtml || "<li>Noch keine Zubereitungsschritte eingetragen.</li>"}</ol>
        </article>
      `;
    }

    function trafficTable(values) {
      const rows = [
        { label: "Kalorien", value: values.kcal, unit: "kcal", type: "kcal" },
        { label: "Eiweiß", value: values.protein, unit: "g", type: "protein" },
        { label: "Kohlenhydrate", value: values.carbs, unit: "g", type: "carbs" },
        { label: "Fett", value: values.fat, unit: "g", type: "fat" }
      ];

      return `
        <table>
          <thead>
            <tr>
              <th>Nährwert</th>
              <th>Wert</th>
              <th>Ampel</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const cls = trafficClass(row.value, row.type);
              const label = trafficLabel(row.value, row.type);
              const max = row.type === "kcal" ? 800 : row.type === "protein" ? 40 : row.type === "carbs" ? 80 : 30;
              const width = Math.min(100, Math.round(row.value / max * 100));
              return `
                <tr>
                  <td>${row.label}</td>
                  <td>${formatNumber(row.value)} ${row.unit}</td>
                  <td><span class="pill ${cls}">${label}</span></td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function renderNutritionTable(recipe) {
      const portion = perPortion(recipe);
      const rows = [
        { label: "Kalorien", value: portion.kcal, unit: "kcal", type: "kcal" },
        { label: "Eiweiß", value: portion.protein, unit: "g", type: "protein" },
        { label: "Kohlenhydrate", value: portion.carbs, unit: "g", type: "carbs" },
        { label: "Fett", value: portion.fat, unit: "g", type: "fat" }
      ];

      return `
        <h2>Kalorien- und Nährwert-Ampel</h2>
        <div class="traffic">
          ${rows.map(row => {
            const cls = trafficClass(row.value, row.type);
            const label = trafficLabel(row.value, row.type);
            const max = row.type === "kcal" ? 800 : row.type === "protein" ? 40 : row.type === "carbs" ? 80 : 30;
            const width = Math.min(100, Math.round(row.value / max * 100));
            return `
              <div class="traffic-row">
                <strong>${row.label}</strong>
                <div>
                  <div class="bar"><div class="${cls}" style="width: ${width}%"></div></div>
                  <div class="muted">${formatNumber(row.value)} ${row.unit} pro Portion</div>
                </div>
                <span class="pill ${cls}">${label}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function render() {
      renderRecipeList();
      renderEditor();
    }

    function exportData() {
      const data = JSON.stringify({
        app: "digitales-kochbuch",
        version: 1,
        exportedAt: new Date().toISOString(),
        nutrientLibrary,
        recipes: state.recipes
      }, null, 2);

      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mein-kochbuch-export.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importData(file) {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = JSON.parse(reader.result);
          const recipes = Array.isArray(data.recipes) ? data.recipes : [];
          if (!recipes.length) throw new Error("Keine Rezepte gefunden.");

          recipes.forEach(recipe => {
            recipe.id = recipe.id || uid();
            recipe.ingredients = Array.isArray(recipe.ingredients) ? recipe.ingredients : [];
            recipe.steps = Array.isArray(recipe.steps) ? recipe.steps : [];
          });

          await importRecipes(recipes);
        } catch (err) {
          alert("Import fehlgeschlagen: " + err.message);
        }
      };
      reader.readAsText(file);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("de-DE", {
        maximumFractionDigits: 1
      });
    }

    els.newRecipeBtn.addEventListener("click", createRecipe);
    els.emptyNewBtn.addEventListener("click", createRecipe);
    els.exportBtn.addEventListener("click", exportData);
    els.importFile.addEventListener("change", e => {
      const file = e.target.files?.[0];
      if (file) importData(file);
      e.target.value = "";
    });
    els.printBtn.addEventListener("click", () => window.print());

    els.searchInput.addEventListener("input", () => {
      state.search = els.searchInput.value;
      renderRecipeList();
    });

    loadNutrientLibrary();
    loadRecipes();
  </script>
</body>
</html>
