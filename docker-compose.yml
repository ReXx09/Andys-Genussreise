services:
  kochbuch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kochbuch-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/database.sqlite
    volumes:
      - ./database-data:/data
      - ./:/app:ro
    working_dir: /app/server
