services:
  kochbuch:
    image: ghcr.io/rexx09/andys-genussreise:latest
    container_name: kochbuch-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/database.sqlite
    volumes:
      - kochbuch-data:/data
      - /app/server/node_modules
    working_dir: /app/server

volumes:
  kochbuch-data:
